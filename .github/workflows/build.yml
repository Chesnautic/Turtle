name: Build Windows Installer

# Builds the Turtle NSIS installer on GitHub's own Windows runners (so it
# always has full internet access to fetch Electron, unlike a sandboxed
# dev environment) and, when triggered by a version tag, publishes the
# installer to a GitHub Release automatically.
#
# - Push a tag like "v1.0.1" to build AND publish a public Release with
#   the installer attached.
# - Or run this workflow manually (Actions tab -> this workflow -> "Run
#   workflow") to just test that the build works; the installer is then
#   downloadable from that run's "Artifacts" section instead of a public
#   Release.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build installer
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: turtle-installer
          path: dist/*.exe

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
